<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ComicForge — Progress</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Viewer has no sidebar — just a slim top nav -->
  <header class="viewer-topnav">
    <div class="viewer-nav-inner">
      <div class="sidebar-logo" style="gap:10px">
        <span class="logo-mark" style="width:34px;height:34px;font-size:0.8rem">CF</span>
        <div>
          <span class="logo-title" style="font-size:1rem">ComicForge</span>
          <span class="logo-sub">Viewer — Read Only</span>
        </div>
      </div>
      <div class="viewer-stats-row">
        <span class="vstats"><b id="statBooks">0</b> Books</span>
        <span class="vstats"><b id="statChapters">0</b> Chapters</span>
        <span class="vstats"><b id="statDone">0</b> Done</span>
      </div>
    </div>
  </header>

  <div class="viewer-main">

    <!-- Recently Added strip -->
    <section class="recent-strip" id="recentStrip">
      <div class="recent-strip-header">
        <span class="recent-label">🕐 Added in last 24 hours</span>
        <span class="recent-count" id="recentCount">0 items</span>
      </div>
      <div class="recent-pills" id="recentPills"></div>
    </section>

    <div class="loading-state" id="loadingMsg">
      <div class="loading-spinner"></div>
      <span>Loading library…</span>
    </div>

    <section class="books-grid" id="booksGrid"></section>

    <div class="empty-state" id="emptyState">
      <div class="empty-art">📚</div>
      <h3>Nothing published yet</h3>
      <p>Check back soon!</p>
    </div>

  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>
